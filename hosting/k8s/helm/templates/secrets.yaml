{{- if and .Values.secrets.enabled (not .Values.secrets.existingSecret) }}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace (printf "%s-secrets" (include "trigger-v4.fullname" .))) | default dict }}
{{- $existingData := (get $existing "data") | default dict }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "trigger-v4.fullname" . }}-secrets
  labels:
    {{- include "trigger-v4.labels" . | nindent 4 }}
type: Opaque
data:
  SESSION_SECRET: {{ include "trigger-v4.resolveSecret" (dict "existingData" $existingData "key" "SESSION_SECRET" "value" .Values.secrets.sessionSecret) | b64enc | quote }}
  MAGIC_LINK_SECRET: {{ include "trigger-v4.resolveSecret" (dict "existingData" $existingData "key" "MAGIC_LINK_SECRET" "value" .Values.secrets.magicLinkSecret) | b64enc | quote }}
  ENCRYPTION_KEY: {{ include "trigger-v4.resolveSecret" (dict "existingData" $existingData "key" "ENCRYPTION_KEY" "value" .Values.secrets.encryptionKey) | b64enc | quote }}
  PROVIDER_SECRET: {{ include "trigger-v4.resolveSecret" (dict "existingData" $existingData "key" "PROVIDER_SECRET" "value" .Values.secrets.providerSecret) | b64enc | quote }}
  COORDINATOR_SECRET: {{ include "trigger-v4.resolveSecret" (dict "existingData" $existingData "key" "COORDINATOR_SECRET" "value" .Values.secrets.coordinatorSecret) | b64enc | quote }}
  MANAGED_WORKER_SECRET: {{ include "trigger-v4.resolveSecret" (dict "existingData" $existingData "key" "MANAGED_WORKER_SECRET" "value" .Values.secrets.managedWorkerSecret) | b64enc | quote }}
  {{- if and .Values.s3.external.accessKeyId (not .Values.s3.external.existingSecret) }}
  s3-access-key-id: {{ .Values.s3.external.accessKeyId | b64enc | quote }}
  s3-secret-access-key: {{ .Values.s3.external.secretAccessKey | b64enc | quote }}
  {{- end }}
  {{- if and .Values.s3.deploy (not .Values.s3.auth.existingSecret) }}
  s3-auth-access-key-id: {{ include "trigger-v4.s3.auth.effectiveAccessKeyId" . | b64enc | quote }}
  s3-auth-secret-access-key: {{ include "trigger-v4.s3.auth.effectiveSecretAccessKey" . | b64enc | quote }}
  {{- end }}
  {{- if and .Values.postgres.external.databaseUrl (not .Values.postgres.external.existingSecret) }}
  postgres-database-url: {{ .Values.postgres.external.databaseUrl | b64enc | quote }}
  {{- if .Values.postgres.external.directUrl }}
  postgres-direct-url: {{ .Values.postgres.external.directUrl | b64enc | quote }}
  {{- else }}
  postgres-direct-url: {{ .Values.postgres.external.databaseUrl | b64enc | quote }}
  {{- end }}
  {{- end }}
  {{- if and .Values.redis.external.host (not .Values.redis.external.existingSecret) .Values.redis.external.password }}
  redis-password: {{ .Values.redis.external.password | b64enc | quote }}
  {{- end }}
  {{- if and .Values.clickhouse.external.host (not .Values.clickhouse.external.existingSecret) .Values.clickhouse.external.password }}
  clickhouse-password: {{ .Values.clickhouse.external.password | b64enc | quote }}
  {{- end }}
{{- end }}
---
{{- if and .Values.registry.deploy .Values.registry.auth.enabled }}
{{/* Generated here (not in datastore-secret) because it is consumed at render time by
     htpasswd and the dockerconfigjson below. Retained via the plaintext `password` key
     on this secret; htpasswd bcrypt is one-way so it can't be the retain source. */}}
{{- $regAuthName := printf "%s-registry-auth" (include "trigger-v4.fullname" .) }}
{{- $regExisting := (lookup "v1" "Secret" .Release.Namespace $regAuthName) | default dict }}
{{- $regExistingData := (get $regExisting "data") | default dict }}
{{- $regPass := include "trigger-v4.resolveSecret" (dict "existingData" $regExistingData "key" "password" "value" .Values.registry.auth.password) }}
{{- $regAuth := printf "%s:%s" .Values.registry.auth.username $regPass | b64enc }}
{{- $regConfig := dict "auths" (dict (include "trigger-v4.registry.host" .) (dict "username" .Values.registry.auth.username "password" $regPass "auth" $regAuth)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $regAuthName }}
  labels:
    {{- include "trigger-v4.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  htpasswd: {{ htpasswd .Values.registry.auth.username $regPass | trim | b64enc | quote }}
  password: {{ $regPass | b64enc | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "trigger-v4.fullname" . }}-registry-secret
  labels:
    {{- include "trigger-v4.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ $regConfig | toJson | b64enc }}
{{- else if and (not .Values.registry.deploy) .Values.registry.external.auth.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "trigger-v4.fullname" . }}-registry-secret
  labels:
    {{- include "trigger-v4.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ include "trigger-v4.imagePullSecret" . | b64enc }}
{{- end }}